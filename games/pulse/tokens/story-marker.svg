<svg xmlns="http://www.w3.org/2000/svg" width="200" height="300" viewBox="0 0 200 300">
  <!-- STORY MARKER  ·  ~25 mm pawn  ·  qty 1  ·  sits on the current Story beat -->
  <defs>
    <linearGradient id="pawnBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="45%" stop-color="#b3a0ff"/>
      <stop offset="100%" stop-color="#4d2fd6"/>
    </linearGradient>
    <radialGradient id="pawnHead" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#e7deff"/>
      <stop offset="60%" stop-color="#9a82ff"/>
      <stop offset="100%" stop-color="#4d2fd6"/>
    </radialGradient>
  </defs>

  <!-- side elevation of a pawn — a body of revolution, ideal for STL lathe/extrude -->

  <!-- base disc -->
  <ellipse cx="100" cy="244" rx="62" ry="16" fill="#4d2fd6" stroke="#2f1c8c" stroke-width="3"/>
  <path d="M52 240 Q52 224 70 220 L130 220 Q148 224 148 240 Z" fill="url(#pawnBody)" stroke="#2f1c8c" stroke-width="3"/>
  <!-- neck / collar -->
  <path d="M78 220 Q72 180 86 150 L114 150 Q128 180 122 220 Z" fill="url(#pawnBody)" stroke="#2f1c8c" stroke-width="3"/>
  <!-- collar ring (engraved groove) -->
  <path d="M80 168 Q100 178 120 168" fill="none" stroke="#2f1c8c" stroke-width="2.5" opacity="0.7"/>
  <!-- shoulders -->
  <path d="M86 150 Q100 132 114 150 Z" fill="url(#pawnBody)" stroke="#2f1c8c" stroke-width="3"/>
  <!-- head -->
  <circle cx="100" cy="118" r="34" fill="url(#pawnHead)" stroke="#2f1c8c" stroke-width="3"/>

  <!-- star emblem on the head (raised relief = the "you are here" mark) -->
  <polygon points="100,98 105,113 121,113 108,123 113,138 100,129 87,138 92,123 79,113 95,113"
           fill="#fff7d6" stroke="#caa400" stroke-width="1.6" stroke-linejoin="round"/>

  <!-- footprint outline -->
  <ellipse cx="100" cy="244" rx="66" ry="18" fill="none" stroke="#2f1c8c" stroke-width="2" stroke-dasharray="4 5" opacity="0.35"/>

  <!-- label -->
  <text x="100" y="280" text-anchor="middle" font-family="Georgia, serif"
        font-size="20" letter-spacing="2" fill="#4d2fd6">STORY MARKER</text>
  <text x="100" y="296" text-anchor="middle" font-family="Georgia, serif"
        font-size="12" letter-spacing="1" fill="#6b4ddb">25 mm pawn · ×1</text>
</svg>
