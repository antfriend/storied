<svg xmlns="http://www.w3.org/2000/svg" width="200" height="300" viewBox="0 0 200 300">
  <!-- BATON  ·  ~25 × 60 mm  ·  qty 1  ·  conductor marker w/ era dial (0–9) -->
  <defs>
    <linearGradient id="stick" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#caa46a"/>
      <stop offset="45%" stop-color="#f0d9a8"/>
      <stop offset="100%" stop-color="#9c7a44"/>
    </linearGradient>
    <radialGradient id="knob" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#f6e3b8"/>
      <stop offset="100%" stop-color="#9c7a44"/>
    </radialGradient>
    <radialGradient id="dialFace" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#3a3f4a"/>
      <stop offset="100%" stop-color="#1c2027"/>
    </radialGradient>
  </defs>

  <!-- side elevation: this profile revolves / extrudes cleanly to STL -->

  <!-- shaft -->
  <rect x="86" y="58" width="28" height="184" rx="14" fill="url(#stick)" stroke="#6f5630" stroke-width="3"/>
  <!-- tip knob (the "head" that taps the count-in) -->
  <circle cx="100" cy="48" r="26" fill="url(#knob)" stroke="#6f5630" stroke-width="3"/>
  <!-- knurled grip rings (engraved bands) -->
  <g stroke="#6f5630" stroke-width="2.5" opacity="0.6">
    <line x1="88" y1="210" x2="112" y2="210"/>
    <line x1="88" y1="220" x2="112" y2="220"/>
    <line x1="88" y1="230" x2="112" y2="230"/>
  </g>

  <!-- era dial: a knurled wheel set into the shaft, numbers 0–9 around it -->
  <circle cx="100" cy="140" r="40" fill="url(#dialFace)" stroke="#0f1217" stroke-width="3"/>
  <circle cx="100" cy="140" r="40" fill="none" stroke="#c8920a" stroke-width="2" opacity="0.7"/>
  <!-- knurl ticks -->
  <g stroke="#c8920a" stroke-width="2" opacity="0.8">
    <line x1="100" y1="100" x2="100" y2="108"/>
    <line x1="128" y1="112" x2="123" y2="118"/>
    <line x1="140" y1="140" x2="132" y2="140"/>
    <line x1="128" y1="168" x2="123" y2="162"/>
    <line x1="100" y1="180" x2="100" y2="172"/>
    <line x1="72" y1="168" x2="77" y2="162"/>
    <line x1="60" y1="140" x2="68" y2="140"/>
    <line x1="72" y1="112" x2="77" y2="118"/>
  </g>
  <!-- current era reading window -->
  <text x="100" y="153" text-anchor="middle" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#f4c430">1</text>
  <!-- pointer / window frame at top of dial -->
  <polygon points="100,96 92,108 108,108" fill="#c8920a" stroke="#0f1217" stroke-width="1.5"/>

  <!-- footprint outline -->
  <rect x="62" y="22" width="76" height="232" rx="38" fill="none" stroke="#6f5630" stroke-width="2" stroke-dasharray="4 5" opacity="0.35"/>

  <!-- label -->
  <text x="100" y="280" text-anchor="middle" font-family="Georgia, serif"
        font-size="22" letter-spacing="3" fill="#6f5630">BATON</text>
  <text x="100" y="296" text-anchor="middle" font-family="Georgia, serif"
        font-size="12" letter-spacing="1" fill="#9c7a44">25 × 60 mm · era dial 0–9 · ×1</text>
</svg>
